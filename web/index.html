<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UmaAI | 马娘数据库</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/web/styles.css" />
  </head>
  <body>
    <div class="bg-track"></div>
    <header class="hero">
      <p class="hero-tag">Uma Musume Data Center</p>
      <h1>赛马娘数据库控制台</h1>
      <p class="hero-sub">数据抓取、三围分析与可视化一体化面板</p>
    </header>

    <main class="layout">
      <section class="panel action-panel">
        <h2>数据模块</h2>
        <p>每个模块都可在前端直接触发</p>
        <div class="action-list">
          <button class="action-btn" data-action="fetch_info">更新基础资料</button>
          <button class="action-btn" data-action="fetch_chara">更新角色立绘</button>
          <button class="action-btn" data-action="build_body_metrics">生成三围排行</button>
        </div>
      </section>

      <section class="panel stats-panel">
        <h2>概览</h2>
        <div class="stats-grid">
          <article>
            <p class="label">角色总数</p>
            <p class="value" id="stat-total">-</p>
          </article>
          <article>
            <p class="label">有立绘</p>
            <p class="value" id="stat-img">-</p>
          </article>
          <article>
            <p class="label">可算三围</p>
            <p class="value" id="stat-metrics">-</p>
          </article>
          <article>
            <p class="label">最新任务</p>
            <p class="value small" id="stat-job">-</p>
          </article>
        </div>
      </section>

      <section class="panel jobs-panel">
        <h2>任务日志</h2>
        <div id="job-status" class="job-status">暂无任务</div>
        <pre id="job-logs" class="job-logs"></pre>
      </section>

      <section class="panel rank-panel">
        <div class="rank-head">
          <h2>三围排行</h2>
          <div class="controls">
            <label>
              指标
              <select id="rank-metric">
                <option value="waist_to_hip_asc">腰臀比（低到高）</option>
                <option value="waist_to_bust_asc">腰乳比（低到高）</option>
                <option value="bust_cm_desc">胸围（高到低）</option>
                <option value="hip_cm_desc">臀围（高到低）</option>
                <option value="waist_cm_asc">腰围（低到高）</option>
                <option value="height_cm_desc">身高（高到低）</option>
              </select>
            </label>
            <label>
              显示
              <select id="rank-limit">
                <option value="10">Top 10</option>
                <option value="20" selected>Top 20</option>
                <option value="50">Top 50</option>
              </select>
            </label>
          </div>
        </div>
        <div id="rank-list" class="rank-list"></div>
      </section>

      <section class="panel card-panel">
        <div class="rank-head">
          <h2>角色卡片</h2>
          <div class="controls">
            <label>
              搜索
              <input id="search-input" type="text" placeholder="中文/日文/英文名" />
            </label>
          </div>
        </div>
        <div id="card-grid" class="card-grid"></div>
      </section>
    </main>

    <script src="/web/app.js"></script>
  </body>
</html>
